<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[pagarmenos.com.br] - Este domínio está à venda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            padding: 40px;
            text-align: center;
            max-width: 550px;
            width: 100%;
        }

        .badge {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 2rem;
            color: #1a202c;
            margin-bottom: 15px;
            word-wrap: break-word;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .contact-zone {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
        }

        .btn-whatsapp:hover {
            background-color: #20ba5a;
        }

        .btn-email {
            background-color: #2d3748;
            color: white;
        }

        .btn-email:hover {
            background-color: #1a202c;
        }

        .footer {
            font-size: 0.85rem;
            color: #a0aec0;
            border-top: 1px solid #edf2f7;
            padding-top: 20px;
        }

        /* Ajuste para telas pequenas */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="badge">Oportunidade</span>
        <!-- Substitua pelo nome do seu domínio -->
        <h1>[pagarmenos.com.br]</h1> 
        <p class="subtitle">Este domínio está disponível para venda. Se você tem interesse em adquirir este endereço para o seu negócio ou projeto, entre em contato direto com o proprietário.</p>

        <div class="contact-zone">
            <!-- Link do WhatsApp (Substitua o número 55... pelo seu com DDD, apenas números) -->
            <a href="https://wa.me/5545920014571?text=Olá,%20tenho%20interesse%20no%20domínio" class="btn btn-whatsapp" target="_blank">
                Falar pelo WhatsApp
            </a>

            <!-- Link de E-mail (Substitua pelo seu e-mail) -->
            <a href="mailto:[martins.floripa@gmail.com]?subject=Interesse%20no%20dominio%20[pagarmenos.com.br]" class="btn btn-email">
                Enviar um E-mail
            </a>
        </div>

        <div class="footer">
            <p>Negociação direta e segura com o proprietário.</p>
        </div>
    </div>

</body>
</html>
